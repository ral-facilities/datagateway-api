name: CI
on:
  workflow_dispatch:
    inputs:
      push-docker-image-to-harbor:
        description: "Push Docker Image to Harbor"
        type: boolean
        default: false
  pull_request:
  push:
    branches:
      - main
      - develop
jobs:
  tests:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    name: Build & Tests

    steps:
      - name: Checkout DataGateway API
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create coverage file
        run: touch coverage.xml

      - name: Run unit tests
        run: docker compose run unit-tests

      - name: Start test dependencies
        run: docker compose --profile dependencies up -d

      - name: Wait for test data generation
        run: docker wait dg_api_testdata

      - name: Run integration tests
        run: docker compose run integration-tests

      - name: Upload code coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose --profile dependencies down

  linting:
    runs-on: ubuntu-24.04
    name: Linting

    steps:
      - name: Checkout DataGateway API
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run linting
        run: docker compose run lint

  formatting:
    runs-on: ubuntu-24.04
    name: Code Formatting

    steps:
      - name: Checkout DataGateway API
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run formatting checks
        run: docker compose run format

  generator-script-testing:
    runs-on: ubuntu-24.04
    continue-on-error: true
    name: icatdb Generator Script Consistency Test

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: pr

      - name: Start dependencies
        working-directory: pr
        run: docker compose --profile dependencies up -d

      - name: Wait for test data generation
        run: docker wait dg_api_testdata

      - name: Drop modTime and createTime
        run: |
          docker exec -i icat_mariadb_container \
            mysql -picatdbuserpw -uicatdbuser icatdb \
            < pr/util/columns_to_drop.sql

      - name: Get SQL dump of dummy data
        run: |
          docker exec icat_mariadb_container \
            mysqldump \
            -picatdbuserpw \
            -uicatdbuser \
            --skip-comments \
            icatdb > generator_script_dump_1.sql

      - name: Recreate ICAT environment
        working-directory: pr
        run: |
          docker compose --profile dependencies down
          docker compose --profile dependencies up -d

      - name: Wait for regenerated test data
        run: docker wait dg_api_testdata

      - name: Drop modTime and createTime
        run: |
          docker exec -i icat_mariadb_container \
            mysql -picatdbuserpw -uicatdbuser icatdb \
            < pr/util/columns_to_drop.sql

      - name: Get SQL dump of regenerated data
        run: |
          docker exec icat_mariadb_container \
            mysqldump \
            -picatdbuserpw \
            -uicatdbuser \
            --skip-comments \
            icatdb > generator_script_dump_2.sql

      - name: Diff SQL dumps
        run: diff -s generator_script_dump_1.sql generator_script_dump_2.sql

      - name: Shutdown PR stack
        working-directory: pr
        run: docker compose --profile dependencies down

      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: main

      - name: Start default branch dependencies
        working-directory: main
        run: docker compose --profile dependencies up -d

      - name: Wait for test data generation
        run: docker wait dg_api_testdata

      - name: Drop modTime and createTime
        run: |
          docker exec -i icat_mariadb_container \
            mysql -picatdbuserpw -uicatdbuser icatdb \
            < main/util/columns_to_drop.sql

      - name: Get SQL dump of dummy data from default branch generator
        run: |
          docker exec icat_mariadb_container \
            mysqldump \
            -picatdbuserpw \
            -uicatdbuser \
            --skip-comments \
            icatdb > generator_script_dump_main.sql

      # NOTE: If a deliberate change is made to the script that changes
      # generated data, this comparison may fail. The job remains
      # continue-on-error to avoid blocking merges.
      - name: Compare current branch output with default branch
        run: diff -s generator_script_dump_main.sql generator_script_dump_1.sql

      - name: Cleanup
        if: always()
        working-directory: main
        run: docker compose --profile dependencies down

  pip-install-testing:
    runs-on: ubuntu-24.04
    name: Pip Install Test

    steps:
      - name: Checkout DataGateway API
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          architecture: x64

      - name: Start test dependencies
        run: docker compose --profile dependencies up -d

      - name: Create and activate virtual environment
        run: |
          python3 -m venv dg-api-venv
          source dg-api-venv/bin/activate
      - name: Install DataGateway API via pip
        run: pip install .

        # Prep for using the API for tests
      - name: Configure datagateway extension
        run: echo "`yq \
          '.datagateway_api.extension="/datagateway-api"' datagateway_api/config.yaml.example`" > datagateway_api/config.yaml.example
      - name: Create config.yaml
        run: cp datagateway_api/config.yaml.example datagateway_api/config.yaml
      - name: Replace ICAT URL in config
        run: sed -i 's#http://icat_payara_container:8080#https://localhost:18181#g' datagateway_api/config.yaml
      - name: Create search_api_mapping.json
        run: cp datagateway_api/search_api_mapping.json.example datagateway_api/search_api_mapping.json
      - name: Create logging.ini
        run: cp datagateway_api/logging.example.ini datagateway_api/logging.ini

      # Launch API to see if it starts correctly or has a startup issue
      # Code logic used from https://stackoverflow.com/a/63643845
      - name: Start API
        run: timeout 10 python -m datagateway_api.main || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi

  docker:
    # This job triggers only if all the other jobs succeed and does different things depending on the context.
    # The job builds the Docker image in all cases and also pushes the image to Harbor only if something is
    # pushed to the main branch.
    needs:
      [
        tests,
        linting,
        formatting,
        generator-script-testing,
        pip-install-testing,
      ]
    name: Docker
    runs-on: ubuntu-24.04
    env:
      PUSH_DOCKER_IMAGE_TO_HARBOR: ${{ inputs.push-docker-image-to-harbor != null && inputs.push-docker-image-to-harbor || 'false' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3.5.3

      - name: Login to Harbor
        if: ${{ fromJSON(env.PUSH_DOCKER_IMAGE_TO_HARBOR) }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ vars.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ vars.HARBOR_URL }}/datagateway-api

      - name: ${{ fromJSON(env.PUSH_DOCKER_IMAGE_TO_HARBOR) && 'Build and push Docker image to Harbor' || 'Build Docker image' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: ${{ fromJSON(env.PUSH_DOCKER_IMAGE_TO_HARBOR) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
