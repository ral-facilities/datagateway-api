[tool.poetry]
name = "datagateway-api"
version = "9.1.0"
description = "ICAT API to interface with the DataGateway"
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/ral-facilities/datagateway-api"
repository = "https://github.com/ral-facilities/datagateway-api"
authors = ["Matthew Richards <matthew.richards@stfc.ac.uk>"]

[tool.semantic_release]
version_toml = [
    "pyproject.toml:tool.poetry.version"
]
branch = "main"
upload_to_pypi = false
upload_to_release = true
build_command = "pip install poetry==1.8.0 && poetry build"

[tool.poetry.dependencies]
python = ">=3.10.0,<4.0"
Flask = "^2.0.3"
Flask-RESTful = "^0.3.7"
Flask-Cors = "^4.0.1"
apispec = "3.3.0"
flask-swagger-ui = "3.25.0"
PyYAML = "^6.0"
python-icat = "1.0.0"
suds-community = "^0.8.4"
py-object-pool = "^1.1"
cachetools = "^4.2.1"
requests = "^2.25.1"
python-dateutil = "^2.8.1"
pydantic = "^2.12.5"

[tool.poetry.dev-dependencies]
pip-tools = "5.3.1"
Faker = "8.5.1"
black = "^24.10.0"
flake8 = "^7.1.1"
flake8-bandit = "^4.1.1"
flake8-black = "^0.3.6"
flake8-broken-line = "^1.0.0"
flake8-bugbear = "^24.8.19"
flake8-builtins = "^2.5.0"
flake8-commas = "^4.0.0"
flake8-comprehensions = "^3.15.0"
flake8-import-order = "^0.18.2"
flake8-logging-format = "^1.0.0"
pep8-naming = "^0.14.1"
pytest = "^8.3.3"
coverage = "^7.6.4"
pytest-cov = "^5.0.0"
pytest-icdiff = "^0.9"
python-semantic-release = "^7.19.2"
coverage-conditional-plugin = "^0.9.0"
safety = "^2.2.0"

[tool.poetry.scripts]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.coverage.paths]
source = ["datagateway_api"]

[tool.coverage.run]
branch = true
source = ["datagateway_api"]
plugins = ["coverage_conditional_plugin"]
omit = [
    "*api_start_utils.py",
    "*logger_setup.py",
    "*main.py",
    "*wsgi.py",
]

[tool.coverage.coverage_conditional_plugin.rules]
py-37-code = "sys_version_info > (3, 6)"

[tool.coverage.report]
show_missing = true
